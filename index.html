<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO EXAM v7.0 | Adham's Development</title>
    <style>
        /* --- 1. UNIVERSAL & GLASSMORPHISM DESIGN --- */
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --bg-dark: #0f172a;
            --accent: #3b82f6;
            --correct: #10b981;
            --wrong: #ef4444;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 2. FIXED HEADER (LIVE SCORE & PROGRESS) --- */
        .exam-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-group {
            display: flex;
            gap: 12px;
        }

        .stat-box {
            background: var(--glass);
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-box.correct { color: var(--correct); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .stat-box.wrong { color: var(--wrong); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }

        /* --- 3. AUTO-SWITCH INDICATOR BAR (SAVOLLAR XARITASI) --- */
        .indicator-wrapper {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 0 10px 0;
            scrollbar-width: none; /* Firefox */
        }

        .indicator-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .indicator-bar {
            display: inline-flex;
            gap: 8px;
            padding: 0 10px;
        }

        .step-node {
            min-width: 35px;
            height: 35px;
            border-radius: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.5);
        }

        .step-node.active {
            transform: scale(1.1);
            border-color: var(--accent);
            color: white;
            background: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .step-node.done-correct { background: var(--correct); color: white; border: none; }
        .step-node.done-wrong { background: var(--wrong); color: white; border: none; }

        /* --- 4. MAIN CONTENT AREA --- */
        .main-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .question-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .option-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .option-btn:active { transform: scale(0.98); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.3s ease-in-out; }

    </style>
</head>
<body>

    <!-- INTEGRATED HEADER -->
    <header class="exam-header">
        <div class="top-bar">
            <div class="stats-group">
                <div class="stat-box correct">✅ <span id="correctScore">0</span></div>
                <div class="stat-box wrong">❌ <span id="wrongScore">0</span></div>
            </div>
            <div class="stat-box">SAVOL: <span id="currentTitle">1</span> / <span id="totalTitle">60</span></div>
        </div>

        <!-- AUTO-SWITCH INDICATOR BAR -->
        <div class="indicator-wrapper" id="scrollWrapper">
            <div class="indicator-bar" id="indicatorBar">
                <!-- JS will inject nodes here -->
            </div>
        </div>
    </header>

    <main class="main-container">
        <div id="quiz-app" class="question-card">
            <div class="question-text" id="qText">Savol yuklanmoqda...</div>
            <div class="options-grid" id="optionsContainer">
                <!-- Options will appear here -->
            </div>
        </div>
    </main>

    <script>
        // --- 5. CORE LOGIC INTEGRATION ---
        const totalQuestions = 60; // Testlar soni
        let currentIdx = 0;
        let correctCount = 0;
        let wrongCount = 0;

        // Indikatorlarni yaratish
        function initIndicators() {
            const bar = document.getElementById('indicatorBar');
            document.getElementById('totalTitle').innerText = totalQuestions;
            
            for (let i = 1; i <= totalQuestions; i++) {
                const node = document.createElement('div');
                node.className = 'step-node';
                node.id = `node-${i-1}`;
                node.innerText = i;
                bar.appendChild(node);
            }
            updateIndicator();
        }

        // Indikatorni yangilash va AVTO-SKROLL
        function updateIndicator() {
            // Klasslarni tozalash va yangilash
            document.querySelectorAll('.step-node').forEach(n => n.classList.remove('active'));
            const activeNode = document.getElementById(`node-${currentIdx}`);
            
            if (activeNode) {
                activeNode.classList.add('active');
                document.getElementById('currentTitle').innerText = currentIdx + 1;

                // MAGICAL AUTO-SCROLL: Aktiv elementni doim o'rtaga suradi
                activeNode.scrollIntoView({
                    behavior: 'smooth',
                    inline: 'center',
                    block: 'nearest'
                });
            }
        }

        // Javobni tekshirish (Simulatsiya)
        function checkAnswer(isCorrect, btn) {
            const node = document.getElementById(`node-${currentIdx}`);
            
            if (isCorrect) {
                correctCount++;
                document.getElementById('correctScore').innerText = correctCount;
                node.classList.add('done-correct');
                btn.style.background = "var(--correct)";
            } else {
                wrongCount++;
                document.getElementById('wrongScore').innerText = wrongCount;
                node.classList.add('done-wrong');
                btn.style.background = "var(--wrong)";
                document.getElementById('quiz-app').classList.add('shake');
                setTimeout(() => document.getElementById('quiz-app').classList.remove('shake'), 300);
            }

            // 1 soniya kutib keyingi savolga avto-o'tish
            setTimeout(() => {
                if (currentIdx < totalQuestions - 1) {
                    currentIdx++;
                    renderQuestion();
                    updateIndicator();
                } else {
                    alert("Tabriklaymiz! Test yakunlandi.");
                }
            }, 800);
        }

        // Savolni ekranga chiqarish (Mockup)
        function renderQuestion() {
            const qText = document.getElementById('qText');
            const container = document.getElementById('optionsContainer');
            
            qText.innerText = `${currentIdx + 1}-savol: Kamaytirilgan septakkord qanday tuziladi?`;
            container.innerHTML = '';

            const options = [
                { t: "Kichik tertsiya + Kichik tertsiya + Kichik tertsiya", c: true },
                { t: "Majorli uchtovushlik + Minorli septima", c: false },
                { t: "Minorli uchtovushlik + Katta septima", c: false },
                { t: "Sokin va tekis ohangda", c: false }
            ];

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.t;
                btn.onclick = () => checkAnswer(opt.c, btn);
                container.appendChild(btn);
            });
        }

        // Start
        window.onload = () => {
            initIndicators();
            renderQuestion();
        };
    </script>
</body>
</html>
