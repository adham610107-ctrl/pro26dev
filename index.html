<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO EXAM v7.0</title>
    <style>
        /* =========================================
           UI/UX: iOS 26 Vision & Eye Comfort
           ========================================= */
        :root {
            --primary: #0A84FF;
            --success: #32D74B;
            --warning: #FFD60A;
            --error: #FF453A;
            --bg-color: #05050A; /* Deep Navy / Black */
            --card-bg: rgba(28, 28, 32, 0.65);
            --text-main: #F2F2F7;
            --text-muted: #8E8E93;
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 15px rgba(10, 132, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            user-select: none; /* Anti-copy */
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Screen Management */
        .screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            position: relative;
            padding-bottom: 30px;
        }
        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           1. WELCOME SCREEN
           ========================================= */
        #screen-welcome {
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at top right, rgba(10, 132, 255, 0.15), transparent 40%), var(--bg-color);
        }

        .hero-card {
            width: 100%;
            max-width: 450px;
            padding: 40px 25px;
            border-radius: 32px;
            text-align: center;
        }

        .main-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: var(--neon-glow);
            cursor: pointer;
        }

        .hero-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a1a1a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .premium-input {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 1.05rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }
        .premium-input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); }

        .btn-start {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            background: var(--primary);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3);
            transition: transform 0.2s;
        }
        .btn-start:active { transform: scale(0.96); }

        /* =========================================
           2. DASHBOARD (ASOSIY MENYU)
           ========================================= */
        .header-sticky {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-text { 
            font-weight: 900; 
            font-size: 1.2rem; 
            letter-spacing: 0.5px; 
            cursor: pointer; 
            color: var(--primary);
        }
        
        .progress-badges { display: flex; gap: 8px; }
        .badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 800;
        }
        .badge.green { background: rgba(50, 215, 75, 0.15); color: var(--success); }
        .badge.red { background: rgba(255, 69, 58, 0.15); color: var(--error); }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 25px 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        @media (max-width: 450px) { .menu-grid { grid-template-columns: 1fr; } }

        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 20px 15px;
            border-radius: 22px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .menu-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        
        .btn-exam {
            grid-column: 1 / -1; 
            background: linear-gradient(135deg, #BF5AF2, #5E5CE6);
            color: #fff;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            border: none;
            padding: 22px;
        }

        /* =========================================
           3. TEST ENGINE UI
           ========================================= */
        .live-stats { font-weight: 800; font-size: 1rem; }
        .btn-exit {
            background: rgba(255, 69, 58, 0.15);
            color: var(--error);
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Auto Indicator Bar */
        .indicator-scroll {
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .indicator-scroll::-webkit-scrollbar { display: none; }
        
        .indicator-track {
            display: flex;
            gap: 10px;
            padding: 0 50vw; /* Markazga kelishi uchun */
        }

        .dot {
            min-width: 46px;
            height: 46px;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .dot.active {
            border: 2px solid var(--primary);
            color: var(--primary);
            transform: scale(1.15);
            box-shadow: var(--neon-glow);
            background: var(--bg-color);
        }
        .dot.correct { background: var(--success); color: #fff; border: none; }
        .dot.wrong { background: var(--error); color: #fff; border: none; }

        /* Question Area */
        .q-container {
            flex-grow: 1;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .q-card {
            width: 100%;
            padding: 30px 20px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 25px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Casino Spin Animation */
        .spin-box {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 15px;
            height: 24px;
        }
        .q-text { font-size: 1.25rem; font-weight: 600; line-height: 1.4; }

        .options-grid { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            color: var(--text-main);
            font-size: 1.05rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Animations */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            width: 100%; max-width: 380px;
            padding: 25px; border-radius: 32px;
        }
        
        .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .lvl-btn { padding: 15px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; font-weight: 700; cursor: pointer; }
        
        /* Result Donut */
        .donut {
            width: 140px; height: 140px; border-radius: 50%;
            border: 10px solid var(--glass-border);
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
        }
        .donut span { font-size: 2.2rem; font-weight: 900; }
        .res-msg { text-align: center; font-size: 1.1rem; font-weight: 700; margin-bottom: 25px; line-height: 1.4;}

    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 1. WELCOME SCREEN -->
    <div id="screen-welcome" class="screen active">
        <div class="hero-card glass">
            <!-- LOGO: Bosh sahifaga qaytish vazifasini ham bajaradi -->
            <img src="logo.png" class="main-logo" alt="Logo" onclick="location.reload()" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
            <h1 class="hero-title">PRO EXAM</h1>
            <p class="hero-subtitle">Bu yerda siz imtihonga tayyor bo'lasiz. Real test muhitida mashq qiling va natijangizni oshiring.</p>
            <input type="text" id="student-name" class="premium-input" placeholder="Ismingizni kiriting..." autocomplete="off">
            <button class="btn-start" onclick="login()">Boshlash 🚀</button>
        </div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="screen-dash" class="screen">
        <div class="header-sticky glass">
            <!-- Matnli LOGO: Bosilganda reload bo'ladi -->
            <div class="logo-text" onclick="location.reload()">PRO EXAM</div>
            <div class="progress-badges">
                <div class="badge green">O'zlashtirildi: <span id="dash-learned">0</span>/800</div>
                <div class="badge red">Xatolar: <span id="dash-errors">0</span></div>
            </div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="openLevels('musiqa_nazariyasi', 'Musiqa nazariyasi')">🎼 Musiqa nazariyasi <span>›</span></button>
            <button class="menu-btn" onclick="openLevels('cholgu_ijrochiligi', 'Cholg\'u ijrochiligi')">🎻 Cholg'u ijrochiligi <span>›</span></button>
            <button class="menu-btn" onclick="openLevels('vokal_ijrochiligi', 'Vokal ijrochiligi')">🎤 Vokal ijrochiligi <span>›</span></button>
            <button class="menu-btn" onclick="openLevels('metodika_repertuar', 'Metodika')">📚 Metodika <span>›</span></button>
            
            <button class="menu-btn" style="justify-content:center; color:var(--primary);" onclick="prepareTest('mix_800')">🎲 1-800 Aralash</button>
            <button class="menu-btn" style="justify-content:center;" onclick="prepareTest('seq_800')">⬇️ 1-800 Ketma-ket</button>
            <button class="menu-btn" style="justify-content:center; color:var(--error);" onclick="prepareTest('errors')">🛠 Xatolar ustida ishlash</button>
            <button class="menu-btn btn-exam" onclick="startExamMode()">🎓 IMTIHON MODE (60 savol)</button>
        </div>
    </div>

    <!-- 3. TEST SCREEN -->
    <div id="screen-test" class="screen">
        <div class="header-sticky glass">
            <button class="btn-exit" onclick="confirmExit()">🚪 Chiqish</button>
            <div id="live-counter" class="live-stats">Savol: 1 / 20</div>
            <div id="exam-timer" class="live-stats" style="color:var(--warning); display:none;">00:00</div>
        </div>

        <div class="indicator-scroll" id="auto-scroll-box">
            <div class="indicator-track" id="dot-track"></div>
        </div>

        <div class="q-container">
            <div id="question-card" class="q-card glass">
                <div id="casino-spin" class="spin-box">1</div>
                <div id="question-text" class="q-text">Yuklanmoqda...</div>
            </div>
            
            <div class="options-grid" id="options-box"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modal-level" class="modal-overlay" onclick="closeModal(event, 'modal-level')">
        <div class="modal-content glass">
            <h2 id="modal-subject-title" style="margin-bottom: 15px; font-weight:800; text-align:center;">Fan</h2>
            <div class="level-grid" id="level-grid-box"></div>
            <button class="btn-start" style="margin-top:15px; background:rgba(255,255,255,0.1); color:var(--primary);" onclick="prepareTest('sub_mix')">🎲 Fandan Aralash (20 ta)</button>
        </div>
    </div>

    <div id="modal-setup" class="modal-overlay" onclick="closeModal(event, 'modal-setup')">
        <div class="modal-content glass">
            <h3 style="text-align:center; margin-bottom:20px;">Sozlamalar</h3>
            <p style="color:var(--text-muted); margin-bottom:10px; font-weight:600; font-size:0.9rem;">Qiyinlik darajasi:</p>
            <div style="display:flex; gap:10px; margin-bottom:25px;">
                <button class="lvl-btn" style="flex:1; border-color:var(--success); color:var(--success);" onclick="setDifficulty('easy', this)">Oson</button>
                <button class="lvl-btn" style="flex:1; border-color:var(--warning); color:var(--warning);" onclick="setDifficulty('medium', this)">O'rta</button>
                <button class="lvl-btn" style="flex:1; border-color:var(--error); color:var(--error);" onclick="setDifficulty('hard', this)">Qiyin</button>
            </div>
            <p style="color:var(--text-muted); margin-bottom:10px; font-weight:600; font-size:0.9rem;">Savollar tartibi:</p>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="lvl-btn" onclick="applySetup('rand')">🎲 Aralash (Random)</button>
                <button class="lvl-btn" onclick="applySetup('seq')">⬇️ Ketma-ket</button>
            </div>
        </div>
    </div>

    <div id="modal-result" class="modal-overlay">
        <div class="modal-content glass">
            <h2 style="text-align:center;">Natija</h2>
            <div class="donut" id="result-donut">
                <span id="result-percent">0%</span>
            </div>
            <p class="res-msg" id="result-msg">Xabar</p>
            <button class="btn-start" onclick="goHome()">Asosiy menyuga qaytish</button>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // ==========================================
        // AUDIO & VIBRATION API
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playFeedback(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if(type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                if("vibrate" in navigator) navigator.vibrate(50);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                if("vibrate" in navigator) navigator.vibrate([150, 100, 150]);
            }
        }

        // ==========================================
        // GLOBAL O'ZGARUVCHILAR
        // ==========================================
        let bank = [];
        let currentTest = [];
        let currentIdx = 0;
        let stats = JSON.parse(localStorage.getItem('adham_pro_stats')) || { learned: [], errors: [] };
        let timerInterval;
        let pendingSubject = null;
        let pendingLevelQs = [];
        let isExamMode = false;
        let testType = null;

        // ==========================================
        // 1. DATA YUKLASH VA FILTERLASH
        // ==========================================
        async function loadData() {
            const files = ['musiqa_nazariyasi.json', 'cholgu_ijrochiligi.json', 'vokal_ijrochiligi.json', 'metodika_repertuar.json'];
            let globalId = 1;
            
            for (const f of files) {
                try {
                    const res = await fetch(f);
                    const data = await res.json();
                    const subjectName = f.replace('.json', '');
                    
                    data.forEach(q => {
                        let opts = q.options.filter(o => o !== null && o.toString().trim() !== '');
                        let correctText = q.options[q.answer]; 

                        // 3 TA VARIANT BO'LSA: Avtomatik 4-sini qo'shish
                        if(opts.length === 3) opts.push("Barcha javoblar to'g'ri");

                        bank.push({
                            id: globalId++,
                            subject: subjectName,
                            q: q.q,
                            originalOpts: opts,
                            correctText: correctText
                        });
                    });
                } catch(e) { console.warn(f + " yuklanmadi."); }
            }
            updateDashboardStats();
        }
        window.onload = loadData;

        // ==========================================
        // 2. EKRANLAR VA MENYU BOSHQRUVI
        // ==========================================
        function switchScreen(hideId, showId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(showId).classList.add('active');
        }

        function login() {
            const name = document.getElementById('student-name').value.trim();
            if(name.length < 2) return alert("Ismingizni kiriting!");
            // Audio contextni user bilan interaksiyada uyg'otish
            if(audioCtx.state === 'suspended') audioCtx.resume();
            switchScreen('screen-welcome', 'screen-dash');
        }

        function goHome() {
            clearInterval(timerInterval);
            document.getElementById('modal-result').style.display = 'none';
            switchScreen('screen-test', 'screen-dash');
            updateDashboardStats();
        }

        function confirmExit() {
            if(confirm("Testdan chiqishni xohlaysizmi? Yechilmagan natijalar saqlanmaydi.")) goHome();
        }

        function updateDashboardStats() {
            document.getElementById('dash-learned').innerText = stats.learned.length;
            document.getElementById('dash-errors').innerText = stats.errors.length;
        }

        function closeModal(e, id) {
            if(e.target.id === id) document.getElementById(id).style.display = 'none';
        }

        // ==========================================
        // 3. LEVEL VA SOZLAMALAR
        // ==========================================
        function openLevels(sub, title) {
            pendingSubject = sub;
            document.getElementById('modal-subject-title').innerText = title;
            const grid = document.getElementById('level-grid-box');
            grid.innerHTML = '';
            
            let subQs = bank.filter(q => q.subject === sub);
            
            for(let i=0; i<10; i++) {
                let start = i * 20;
                let end = start + 20;
                if(start >= subQs.length) break;
                
                let btn = document.createElement('button');
                btn.className = 'lvl-btn';
                btn.innerHTML = `${i+1}-LVL <br><span style="font-size:0.8rem; opacity:0.7">${start+1}-${end}</span>`;
                btn.onclick = () => {
                    pendingLevelQs = subQs.slice(start, end);
                    testType = 'level';
                    openSetup();
                };
                grid.appendChild(btn);
            }
            document.getElementById('modal-level').style.display = 'flex';
        }

        function prepareTest(type) {
            document.getElementById('modal-level').style.display = 'none';
            if (type === 'errors' && stats.errors.length === 0) return alert("Sizda xatolar yo'q. Barakalla!");
            testType = type;
            openSetup();
        }

        function openSetup() {
            document.getElementById('modal-setup').style.display = 'flex';
        }

        function setDifficulty(lvl, btn) {
            let btns = document.querySelectorAll('#modal-setup .lvl-btn:nth-child(-n+3)');
            btns.forEach(b => b.style.opacity = '0.5');
            btn.style.opacity = '1';
        }

        // ==========================================
        // 4. TEST BAZASINI SHAKLLANTIRISH
        // ==========================================
        function applySetup(order) {
            document.getElementById('modal-setup').style.display = 'none';
            isExamMode = false;
            
            let pool = [];
            if(testType === 'level') pool = [...pendingLevelQs];
            else if(testType === 'mix_800') pool = bank.sort(() => Math.random() - 0.5).slice(0, 20);
            else if(testType === 'seq_800') pool = bank.slice(0, 20);
            else if(testType === 'errors') pool = bank.filter(q => stats.errors.includes(q.id));
            else if(testType === 'sub_mix') pool = bank.filter(q => q.subject === pendingSubject).sort(() => Math.random()-0.5).slice(0, 20);
            
            if(order === 'rand') pool = pool.sort(() => Math.random() - 0.5);

            currentTest = pool;
            startTestSession();
        }

        function startExamMode() {
            testType = 'exam';
            isExamMode = true;
            
            let examQs = [];
            const subjects = ['musiqa_nazariyasi', 'cholgu_ijrochiligi', 'vokal_ijrochiligi', 'metodika_repertuar'];
            subjects.forEach(sub => {
                let sQs = bank.filter(q => q.subject === sub).sort(() => Math.random() - 0.5).slice(0, 15);
                examQs = examQs.concat(sQs);
            });
            
            currentTest = examQs.sort(() => Math.random() - 0.5);
            startTestSession();
        }

        // ==========================================
        // 5. TEST ENGINE & ANIMATIONS
        // ==========================================
        function startTestSession() {
            switchScreen('screen-dash', 'screen-test');
            currentIdx = 0;
            
            currentTest = currentTest.map(q => {
                let shuffledOpts = [...q.originalOpts].sort(() => Math.random() - 0.5);
                let correctIdx = shuffledOpts.indexOf(q.correctText);
                return { ...q, options: shuffledOpts, answer: correctIdx, userAns: null };
            });

            const track = document.getElementById('dot-track');
            track.innerHTML = currentTest.map((_, i) => `<div class="dot" id="dot-${i}">${i+1}</div>`).join('');

            const timerEl = document.getElementById('exam-timer');
            if(isExamMode) {
                timerEl.style.display = 'block';
                startTimer(60 * 60); 
            } else {
                timerEl.style.display = 'none';
            }

            loadQuestion();
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds--;
                let m = Math.floor(seconds/60);
                let s = seconds % 60;
                document.getElementById('exam-timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(seconds <= 0) { clearInterval(timerInterval); showResult(); }
            }, 1000);
        }

        function loadQuestion() {
            const q = currentTest[currentIdx];
            document.getElementById('live-counter').innerText = `Savol: ${currentIdx + 1} / ${currentTest.length}`;
            
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            const activeDot = document.getElementById(`dot-${currentIdx}`);
            if(activeDot) {
                activeDot.classList.add('active');
                activeDot.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }

            const spin = document.getElementById('casino-spin');
            const qCard = document.getElementById('question-card');
            qCard.classList.remove('shake');
            
            let spinCount = 0;
            let spinInt = setInterval(() => {
                spin.innerText = Math.floor(Math.random() * currentTest.length) + 1;
                spinCount++;
                if(spinCount > 8) {
                    clearInterval(spinInt);
                    spin.innerText = currentIdx + 1;
                }
            }, 40);

            document.getElementById('question-text').innerText = q.q;
            const optBox = document.getElementById('options-box');
            optBox.innerHTML = q.options.map((opt, i) => `
                <button class="opt-btn" onclick="selectAnswer(${i}, this)">${opt}</button>
            `).join('');
        }

        function selectAnswer(selectedIdx, btnEl) {
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(b => b.disabled = true);

            const q = currentTest[currentIdx];
            const isCorrect = (selectedIdx === q.answer);
            q.userAns = isCorrect;

            const dot = document.getElementById(`dot-${currentIdx}`);
            const qCard = document.getElementById('question-card');

            if(isCorrect) {
                btnEl.style.background = 'var(--success)';
                btnEl.style.color = '#fff';
                btnEl.style.borderColor = 'var(--success)';
                btnEl.style.boxShadow = '0 0 15px rgba(50, 215, 75, 0.4)';
                dot.classList.add('correct');
                playFeedback('correct');
                
                if(!stats.learned.includes(q.id)) stats.learned.push(q.id);
                stats.errors = stats.errors.filter(id => id !== q.id); 
            } else {
                btnEl.style.background = 'var(--error)';
                btnEl.style.color = '#fff';
                btnEl.style.borderColor = 'var(--error)';
                qCard.classList.add('shake');
                dot.classList.add('wrong');
                playFeedback('wrong');
                
                if(!stats.errors.includes(q.id)) stats.errors.push(q.id);
                // DIQQAT: Xato belgilanganda to'g'ri javob ko'rsatilmasligi uchun qatorlar olib tashlandi.
            }
            
            localStorage.setItem('adham_pro_stats', JSON.stringify(stats));

            setTimeout(() => {
                if(currentIdx < currentTest.length - 1) {
                    currentIdx++;
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        // ==========================================
        // 6. NATIJALAR VA PSIXOLOGIYA
        // ==========================================
        function showResult() {
            clearInterval(timerInterval);
            let correctCount = currentTest.filter(q => q.userAns === true).length;
            let percent = Math.round((correctCount / currentTest.length) * 100);
            
            document.getElementById('result-percent').innerText = `${percent}%`;
            
            let msg = "";
            let color = "";
            
            if(percent >= 90) { 
                msg = "Zo'r! Siz imtihonga to'liq tayyorsiz. 🏆"; 
                color = "var(--success)"; 
            }
            else if(percent >= 70) { 
                msg = "Yaxshi natija, lekin biroz mashq qiling. 👍"; 
                color = "var(--primary)"; 
            }
            else if(percent >= 50) { 
                msg = "Ko'rdingizmi? Yana urinib ko'ring! 📚"; 
                color = "var(--warning)"; 
            }
            else { 
                msg = "Ko'proq mashq kerak! Xatolar ustida ishlang. ⚠️"; 
                color = "var(--error)"; 
            }

            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-donut').style.borderColor = color;
            document.getElementById('result-percent').style.color = color;

            document.getElementById('modal-result').style.display = 'flex';
        }
    </script>
</body>
</html>
