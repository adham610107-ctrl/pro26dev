<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO EXAM | Universal System</title>
    <style>
        /* --- DYNAMIC THEME & GLASSMORPHISM --- */
        :root {
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --text-main: #f1f5f9;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- STICKY SMART HEADER --- */
        .smart-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .brand-logo {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-counter {
            display: flex;
            gap: 8px;
        }

        .counter-pill {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--glass-border);
        }

        /* --- AUTO-SCROLL INDICATOR BAR (THE "MAGIC" PART) --- */
        .indicator-scroll-area {
            width: 100%;
            overflow-x: auto;
            display: flex;
            gap: 10px;
            padding: 5px 0 10px 0;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .indicator-scroll-area::-webkit-scrollbar { display: none; }

        .step-item {
            min-width: 40px;
            height: 40px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex-shrink: 0;
        }

        .step-item.current {
            background: var(--accent);
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .step-item.correct { background: var(--success); border: none; }
        .step-item.wrong { background: var(--error); border: none; }

        /* --- QUESTION AREA --- */
        .quiz-wrapper {
            max-width: 650px;
            margin: 20px auto;
            padding: 15px;
        }

        .question-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .q-meta { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }

        .q-title { font-size: 20px; line-height: 1.4; margin-bottom: 25px; min-height: 60px; }

        .options-list { display: grid; gap: 12px; }

        .opt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 16px;
            color: #cbd5e1;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .opt-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }

        /* --- MODAL RESULTS --- */
        #resultModal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            text-align: center;
        }

        .res-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; margin-bottom: 20px; }

        /* Animations */
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .pop-in { animation: pop 0.3s ease-out; }
    </style>
</head>
<body>

    <header class="smart-header">
        <div class="header-top">
            <div class="brand-logo">💎 PRO EXAM v7.5</div>
            <div class="live-counter">
                <div class="counter-pill" style="color: var(--success)">✅ <span id="c-count">0</span></div>
                <div class="counter-pill" style="color: var(--error)">❌ <span id="w-count">0</span></div>
            </div>
        </div>

        <!-- MAGIC INDICATOR BAR -->
        <div class="indicator-scroll-area" id="indicatorBar">
            <!-- Nodes injected by JS -->
        </div>
    </header>

    <main class="quiz-wrapper">
        <div class="question-box pop-in" id="qBox">
            <div class="q-meta" id="qProgress">Savol 1 / 60</div>
            <div class="q-title" id="qTitle">Yuklanmoqda...</div>
            <div class="options-list" id="optList">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </main>

    <!-- RESULT MODAL -->
    <div id="resultModal">
        <h2>Imtihon Yakunlandi!</h2>
        <div class="res-circle" id="finalPercent">0%</div>
        <p id="finalStatText">Jami: 60 ta | To'g'ri: 0 | Xato: 0</p>
        <button onclick="location.reload()" class="opt-btn" style="margin-top: 30px; background: var(--accent); color: #000; font-weight: bold; width: 200px; text-align: center;">Qayta Boshlash</button>
    </div>

    <script>
        // --- DATA & LOGIC ---
        const config = {
            total: 20, // Test uchun 20 ta qildim, xohlasangiz 200 qiling
            current: 0,
            correct: 0,
            wrong: 0
        };

        // Savollar bazasi (Namuna)
        const db = [
            { q: "Kamaytirilgan septakkord (VII7) qanday tuziladi?", a: ["k.3 + k.3 + k.3", "m.3 + k.3 + m.3", "k.3 + m.3 + m.3"], right: 0 },
            { q: "Musiqada 'Piano' termini nimani anglatadi?", a: ["Tez", "Sokin", "Juda baland"], right: 1 },
            { q: "Garmonik minor gammasida qaysi pog'ona orttiriladi?", a: ["VI", "VII", "II"], right: 1 }
            // Savollarni shu tartibda ko'paytirish mumkin
        ];

        function init() {
            const bar = document.getElementById('indicatorBar');
            for(let i=0; i < config.total; i++) {
                const item = document.createElement('div');
                item.className = 'step-item';
                item.id = `step-${i}`;
                item.innerText = i + 1;
                bar.appendChild(item);
            }
            loadQuestion();
        }

        function loadQuestion() {
            // UI Yangilash
            document.getElementById('qProgress').innerText = `Savol ${config.current + 1} / ${config.total}`;
            const currentData = db[config.current % db.length]; // Savollar tugasa takrorlanadi
            document.getElementById('qTitle').innerText = currentData.q;
            
            const list = document.getElementById('optList');
            list.innerHTML = '';
            
            currentData.a.forEach((txt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = txt;
                btn.onclick = () => select(idx, currentData.right, btn);
                list.appendChild(btn);
            });

            updateIndicator();
        }

        function updateIndicator() {
            // Aktiv doirani markazga surish (The Magic Scroll)
            document.querySelectorAll('.step-item').forEach(el => el.classList.remove('current'));
            const activeNode = document.getElementById(`step-${config.current}`);
            activeNode.classList.add('current');
            
            activeNode.scrollIntoView({
                behavior: 'smooth',
                inline: 'center',
                block: 'nearest'
            });
        }

        function select(idx, rightIdx, btn) {
            const node = document.getElementById(`step-${config.current}`);
            const buttons = document.querySelectorAll('.opt-btn');
            buttons.forEach(b => b.disabled = true); // Bir marta tanlash mumkin

            if(idx === rightIdx) {
                config.correct++;
                btn.style.background = "var(--success)";
                btn.style.borderColor = "var(--success)";
                node.classList.add('correct');
            } else {
                config.wrong++;
                btn.style.background = "var(--error)";
                btn.style.borderColor = "var(--error)";
                node.classList.add('wrong');
                // To'g'ri javobni ham ko'rsatish (Professional yondashuv)
                buttons[rightIdx].style.border = "2px solid var(--success)";
            }

            document.getElementById('c-count').innerText = config.correct;
            document.getElementById('w-count').innerText = config.wrong;

            // Avto-o'tish
            setTimeout(() => {
                if(config.current < config.total - 1) {
                    config.current++;
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function showResult() {
            const modal = document.getElementById('resultModal');
            const percent = Math.round((config.correct / config.total) * 100);
            document.getElementById('finalPercent').innerText = percent + "%";
            document.getElementById('finalStatText').innerText = `Jami: ${config.total} | To'g'ri: ${config.correct} | Xato: ${config.wrong}`;
            modal.style.display = 'flex';
        }

        window.onload = init;
    </script>
</body>
</html>
