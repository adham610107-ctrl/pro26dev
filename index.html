<!DOCTYPE html>
<html lang="uz">
<head>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F4F5F0;
            color: #2C3E50;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .card {
            background: white;

            width: 90%;

        h2 { color: #007AFF; margin-bottom: 10px; font-weight: 800; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007AFF;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 25px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { line-height: 1.5; margin: 10px 0; }
        .btn-manual {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 700;
            transition: 0.2s;
        }
        .btn-manual:active { transform: scale(0.95); }

</head>

        }, 500);

</body>
</html>
