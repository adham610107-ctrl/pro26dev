<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adham's Pro Exam System v7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode" id="main-body">

    <div id="bg-overlay" class="background-overlay"></div>

    <nav class="global-nav hidden" id="global-nav">
        <div class="logo-area" onclick="exitToHome()">
            <img src="logo.png" alt="Logo" class="nav-logo" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
            <span class="logo-text">ADHAM PRO <span class="badge">v7.0</span></span>
        </div>
        <div class="nav-right">
            <button id="exit-test-btn" class="exit-mini hidden" onclick="exitToHome()">🚪 Chiqish</button>
            <div id="exam-timer" class="timer-badge hidden">00:00</div>
            <button onclick="toggleTheme()" class="theme-btn">🌗</button>
        </div>
    </nav>

    <div id="welcome-screen" class="screen active">
        <div class="hero-content">
            <h1 class="glow-text">Najot Bilimda!</h1>
            <p class="hero-subtext">Bu rasmiy universitet loyihasi emas, bu sizning muvaffaqiyatingiz uchun maxsus ishlab chiqilgan shaxsiy tayyorgarlik tizimidir. Har bir xato — bu o'sish imkoniyati.</p>
            <div class="input-group">
                <input type="text" id="user-name" class="premium-input" placeholder="Ismingizni kiriting...">
                <button class="btn-start" onclick="startApp()">Tayyorgarlikni boshlash 🚀</button>
            </div>
            <p class="copyright-text">Adham's copyright 2025-2026</p>
        </div>
    </div>

    <div id="dashboard-screen" class="screen hidden">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="total-mastered">0/800</span>
                <span class="stat-lbl">O'zlashtirildi</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="total-errors">0/800</span>
                <span class="stat-lbl">Xatolar</span>
            </div>
        </div>

        <div class="category-grid">
            <button class="cat-btn" onclick="openSetup('musiqa_nazariyasi')">Musiqa nazariyasi</button>
            <button class="cat-btn" onclick="openSetup('cholgu_ijrochiligi')">Cholg'u ijrochiligi</button>
            <button class="cat-btn" onclick="openSetup('vokal_ijrochiligi')">Vokal ijrochiligi</button>
            <button class="cat-btn" onclick="openSetup('metodika_repertuar')">Metodika va repertuar</button>
            <button class="cat-btn accent-btn" onclick="openSetup('mix_1_800')">1-800 Aralash</button>
            <button class="cat-btn error-btn" onclick="startErrorCorrection()">Xatolar ustida ishlash</button>
            <button class="cat-btn exam-btn" onclick="startExam60()">8-Tugma: IMTIHON (60 ta)</button>
        </div>
        
        <div class="social-links">
            <a href="#"><img src="tg.png" class="social-icon"></a>
            <a href="#"><img src="insta.png" class="social-icon"></a>
        </div>
    </div>

    <div id="setup-screen" class="screen hidden">
        <div class="setup-container">
            <h2 id="setup-title">Sozlamalar</h2>
            <div class="difficulty-options">
                <button class="diff-btn easy" onclick="setDiff('easy')">Oson</button>
                <button class="diff-btn medium" onclick="setDiff('medium')">O'rtacha</button>
                <button class="diff-btn hard" onclick="setDiff('hard')">Qiyin</button>
            </div>
            <div id="level-selection" class="level-grid">
                </div>
            <div class="order-options">
                <button class="order-btn" onclick="setOrder('random')">Tasodifiy (1-20)</button>
                <button class="order-btn" onclick="setOrder('sequence')">Ketma-ket (1-20)</button>
            </div>
            <button class="btn-start-test" onclick="initiateTest()">Boshlash 🚀</button>
            <button class="btn-back" onclick="switchScreen('setup-screen', 'dashboard-screen')">Orqaga</button>
        </div>
    </div>

    <div id="test-screen" class="screen hidden">
        <div class="test-header">
            <div class="spin-wheel" id="spin-number">1</div>
            <div class="progress-line"><div id="progress-fill"></div></div>
        </div>
        <div class="container main-layout">
            <div id="indicator-map" class="indicator-map"></div>
            <div id="question-area" class="question-container">
                </div>
            <div class="nav-controls">
                <button class="nav-btn" onclick="move(-1)">⬅️</button>
                <button id="finish-btn" class="finish-btn hidden" onclick="finishTest()">Tugatish ✔️</button>
                <button class="nav-btn" onclick="move(1)">➡️</button>
            </div>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <canvas id="result-chart" width="150" height="150"></canvas>
            <h2 id="result-message"></h2>
            <p id="result-desc"></p>
            <div class="modal-btns">
                <button class="btn-retry" onclick="restartCurrent()">Qayta urinish</button>
                <button class="btn-exit" onclick="exitToHome()">Chiqish</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
